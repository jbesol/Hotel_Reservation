spring.application.name=hotel-reservation

# ── Base de datos ────────────────────────────────────────────────────
# En Railway: PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD se inyectan
# automáticamente desde el plugin de PostgreSQL.
# En local: usa los valores del docker-compose (después de los dos puntos).
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5435}/${PGDATABASE:hotel_db}
spring.datasource.username=${PGUSER:hotel_user}
spring.datasource.password=${PGPASSWORD:hotel_password}

# ── JPA ─────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Puerto ──────────────────────────────────────────────────────────
# Railway inyecta PORT; en local usa 8081.
server.port=${PORT:8081}